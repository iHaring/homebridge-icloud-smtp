version: 2

updates:

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Zurich"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"
      - "npm"

    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"

    target-branch: "main"

    reviewers:
      - "joff0"
      - "liamharing"
